<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт 5-2 класса</title>

    <!-- Favicon для всех устройств -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="shortcut icon" href="/favicon.ico">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html, body {
            height: 100%;
            background-color: #f5f5f5;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Верхняя плашка */
        .top-banner {
            background-color: #111;
            color: white;
            padding: 12px 50px 12px 20px;
            text-align: center;
            font-size: 18px;
            transition: transform 1s ease;
            transform: translateY(0);
            flex-shrink: 0;
            position: relative;
        }

        .top-banner.hidden {
            transform: translateY(-100%);
        }

        .banner-close {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 0 10px;
            line-height: 1;
            transition: opacity 0.2s;
        }

        .banner-close:hover {
            opacity: 0.7;
        }

        /* Основной контейнер с меню и контентом */
        .site-container {
            display: flex;
            width: 100%;
            flex: 1;
            background-color: white;
            overflow: hidden;
        }

        /* Левое меню */
        .menu-panel {
            width: 250px;
            background-color: white;
            border-right: 2px solid #e0e0e0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .menu-btn {
            background: none;
            border: none;
            padding: 15px 25px;
            text-align: left;
            font-size: 18px;
            color: #333;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
            font-weight: 500;
        }

        .menu-btn:hover {
            background-color: #f0f0f0;
            border-left-color: #4CAF50;
        }

        .menu-btn.active {
            background-color: #e8f5e9;
            border-left-color: #4CAF50;
            font-weight: 600;
            color: #2e7d32;
        }

        /* Правая область (контент + футер) */
        .content-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #fafafa;
            overflow-y: auto;
        }

        /* Контейнер для динамического контента */
        .content-main {
            flex: 1;
            padding: 40px;
        }

        /* Футер только под контентом */
        .content-footer {
            background-color: #333;
            color: #aaa;
            text-align: center;
            padding: 15px;
            font-size: 14px;
            border-top: 1px solid #444;
        }

        /* Оформление текста внутри контента (сохраняем старый стиль) */
        .content-text {
            font-size: 20px;
            line-height: 1.6;
            color: #444;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Стили для формы */
        .feedback-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .feedback-form label {
            font-weight: 600;
            color: #333;
        }

        .feedback-form textarea {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 6px;
            resize: vertical;
            min-height: 150px;
            font-family: inherit;
        }

        .feedback-form button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            align-self: flex-start;
        }

        .feedback-form button:hover {
            background-color: #45a049;
        }

        .feedback-form button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        .form-message {
            padding: 10px;
            border-radius: 4px;
            font-weight: 500;
        }

        .form-message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .form-message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Красный прямоугольник предупреждения */
        .warning-box {
            border: 3px solid #ff0000;
            background-color: #ffe6e6;
            border-radius: 15px;
            padding: 20px;
            max-width: 600px;
            color: black;
        }

        .warning-box h3 {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .warning-box p {
            font-size: 18px;
            text-align: center;
        }

        /* Адаптация для мобильных */
        @media (max-width: 768px) {
            .top-banner {
                padding: 10px 40px 10px 10px;
                font-size: 16px;
            }
            .banner-close {
                right: 10px;
                font-size: 24px;
            }
            .site-container {
                flex-direction: column;
            }
            .menu-panel {
                width: 100%;
                border-right: none;
                border-bottom: 2px solid #e0e0e0;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 10px;
            }
            .menu-btn {
                flex: 1 1 auto;
                text-align: center;
                border-left: none;
                border-bottom: 4px solid transparent;
            }
            .menu-btn:hover {
                border-left-color: transparent;
                border-bottom-color: #4CAF50;
            }
            .menu-btn.active {
                border-left-color: transparent;
                border-bottom-color: #4CAF50;
            }
            .content-main {
                padding: 20px;
            }
            .feedback-form button {
                align-self: stretch;
            }
        }
    </style>
</head>
<body>
<!-- Верхняя плашка -->
<div class="top-banner" id="topBanner">
    Сайт пока что дорабатывается, но вскоре возможно будут обновления
    <button class="banner-close" id="closeBanner" aria-label="Закрыть">✕</button>
</div>

<!-- Основная часть с меню и контентом -->
<div class="site-container">
    <!-- Левое меню -->
    <div class="menu-panel">
        <button class="menu-btn active" data-page="home">Главная страница</button>
        <button class="menu-btn" data-page="news">Новости</button>
        <button class="menu-btn" data-page="events">События</button>
        <button class="menu-btn" data-page="schedule">Расписание</button>
        <button class="menu-btn" data-page="feedback">Предложения</button>
    </div>

    <!-- Правая область: контент + футер -->
    <div class="content-panel">
        <div class="content-main" id="content-main">
            <!-- Сюда будет подставляться контент -->
        </div>
        <footer class="content-footer" id="content-footer">
            Все права защищены © <span id="currentYear"></span>
        </footer>
    </div>
</div>

<script>
    // --- Установка текущего года в футере ---
    document.getElementById('currentYear').textContent = new Date().getFullYear();

    // --- Переключение вкладок ---
    const pageContent = {
        home: 'Добро пожаловать на сайт класса 5-2! Пока здесь ничего нету, но со временем будет появляться все больше!',
        news: 'Тут пока ничего нету...',
        events: 'Тут пока ничего нету...',
        schedule: '', // теперь заполняется динамически
        feedback: ''
    };

    const menuButtons = document.querySelectorAll('.menu-btn');
    const contentMain = document.getElementById('content-main');

    function switchPage(pageId) {
        // Убираем активный класс со всех кнопок
        menuButtons.forEach(btn => btn.classList.remove('active'));
        // Активируем нужную кнопку
        const activeButton = Array.from(menuButtons).find(btn => btn.dataset.page === pageId);
        if (activeButton) activeButton.classList.add('active');

        if (pageId === 'schedule') {
            // Массив названий дней
            const days = ['воскресенье', 'понедельник', 'вторник', 'среду', 'четверг', 'пятницу', 'субботу'];

            // Получаем текущую дату
            const today = new Date();

            // Вычисляем дату следующего учебного дня
            const nextDate = new Date(today);
            nextDate.setDate(today.getDate() + 1);

            // Если следующий день - воскресенье (выходной), перескакиваем на понедельник
            if (nextDate.getDay() === 0) { // 0 = воскресенье
                nextDate.setDate(nextDate.getDate() + 1);
            }

            // Индекс дня недели (1 = понедельник, 6 = суббота)
            const nextDayIndex = nextDate.getDay();
            const nextDayName = days[nextDayIndex].toUpperCase();

            // Форматируем дату для имени файла: DD.MM.YYYY
            const day = String(nextDate.getDate()).padStart(2, '0');
            const month = String(nextDate.getMonth() + 1).padStart(2, '0');
            const year = nextDate.getFullYear();
            const dateStr = `${day}.${month}.${year}`;

            // Имя файла для скачивания с датой
            const fileName = `Расписание_5-2_${dateStr}.docx`;

            contentMain.innerHTML = `
                    <div class="content-text" style="text-align: center;">
                        <h2 style="margin-bottom: 30px;">Расписание уроков</h2>
                        <a href="/files/raspisanie.docx" download="${fileName}"
                           style="display: inline-block; padding: 15px 30px; background: #4CAF50; color: white;
                                  text-decoration: none; border-radius: 8px; font-size: 20px;
                                  border: none; cursor: pointer; transition: background 0.2s;">
                            📥 Скачать расписание (DOCX)
                        </a>
                        <div style="margin-top: 40px;">
                            <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">ВЫЛОЖЕНО РАСПИСАНИЕ НА:</div>
                            <div style="font-size: 48px; font-weight: bold; color: #4CAF50;">${nextDayName}</div>
                        </div>
                        <p style="margin-top: 20px; color: #666;">Файл обновляется по мере изменений</p>
                    </div>
                `;
        } else if (pageId === 'feedback') {
            contentMain.innerHTML = `
                    <div class="content-text">
                        <h2 style="margin-bottom: 20px;">Ваши пожелания</h2>
                        <form id="feedbackForm" class="feedback-form">
                            <label for="message">Что бы вы хотели предложить или улучшить?</label>
                            <textarea id="message" name="message" placeholder="Напишите здесь..." required></textarea>
                            <button type="submit" id="submitBtn">Отправить</button>
                            <div id="formMessage" class="form-message"></div>
                        </form>

                        <div class="warning-box">
                            <h3>ВНИМАНИЕ!</h3>
                            <p>Убедительная просьба не спамить пожеланиями, иначе мы не сможем ответить на все!</p>
                        </div>
                    </div>
                `;

            // Обработчик отправки формы
            const form = document.getElementById('feedbackForm');
            const submitBtn = document.getElementById('submitBtn');
            const formMessage = document.getElementById('formMessage');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                submitBtn.disabled = true;
                formMessage.textContent = 'Отправка...';
                formMessage.className = 'form-message';

                const formData = new FormData(form);
                formData.append('_subject', 'Новое пожелание для сайта класса');

                try {
                    const response = await fetch('https://formspree.io/f/mreylvbq', {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'Accept': 'application/json'
                        }
                    });

                    if (response.ok) {
                        formMessage.textContent = 'Спасибо! Ваше пожелание отправлено.';
                        formMessage.className = 'form-message success';
                        form.reset();
                    } else {
                        const data = await response.json();
                        if (data.errors) {
                            formMessage.textContent = 'Ошибка: ' + data.errors.map(e => e.message).join(', ');
                        } else {
                            formMessage.textContent = 'Произошла ошибка. Попробуйте позже.';
                        }
                        formMessage.className = 'form-message error';
                    }
                } catch (error) {
                    formMessage.textContent = 'Ошибка соединения. Проверьте интернет.';
                    formMessage.className = 'form-message error';
                } finally {
                    submitBtn.disabled = false;
                }
            });
        } else {
            // Для главной, новостей, событий — обычный текст
            contentMain.innerHTML = `<div class="content-text">${pageContent[pageId]}</div>`;
        }
    }

    // Навешиваем обработчики на кнопки меню
    menuButtons.forEach(button => {
        button.addEventListener('click', function() {
            switchPage(this.dataset.page);
        });
    });

    // При загрузке показываем главную страницу
    switchPage('home');

    // --- Скрытие верхней плашки ---
    const banner = document.getElementById('topBanner');
    const closeBtn = document.getElementById('closeBanner');

    closeBtn.addEventListener('click', function() {
        banner.classList.add('hidden');
        banner.addEventListener('transitionend', function onTransitionEnd() {
            banner.removeEventListener('transitionend', onTransitionEnd);
            banner.style.display = 'none';
        });
    });
</script>
